<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illithid Fight Club</title>
    <style>
        /* Base Styling and Palette */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 40px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h2 {
            color: #00ffcc;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
        }

        h3 {
            color: #b388ff;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Layout Organizers */
        .form-group {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1rem;
        }
        
        .player, .level {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .multiply-sign {
            color: #888;
            font-weight: bold;
            padding-bottom: 10px;
        }

        p.hint {
            color: #888;
            font-size: 0.85rem;
            margin: -0.2rem 0 0.5rem 0;
        }

        /* Inputs & Controls Layout */
        label {
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="number"], input[type="text"], select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ffcc;
        }

        /* Interactive Action Elements */
        button, input[type="submit"] {
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        button {
            background-color: transparent;
            color: #b388ff;
            border: 1px solid #b388ff;
            align-self: flex-start;
        }

        button:hover {
            background-color: rgba(179, 136, 255, 0.1);
        }

        input[type="submit"] {
            background-color: #00ffcc;
            color: #000;
            border: none;
            margin-top: 15px;
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            background-color: #00cc99;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        #monster-info {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Illithid Fight Club</h2>
    
    <form action="/" method="POST">
        
        <h3>Player Info</h3>
        <div id="character-info">
            <div class="form-group">
                <div class="player">
                    <label>Players</label>
                    <input required type="number" name="player_count[]" min="1" max="20" placeholder="e.g. 4">
                </div>
                <div class="multiply-sign">×</div>
                <div class="level">
                    <label>Level</label>
                    <input required type="number" name="player_level[]" min="1" max="20" placeholder="e.g. 3">
                </div>            
            </div>
        </div>
        
        <div id="monster-info">
            <h3>Encounter Info</h3>
            
            <div class="form-row">
                <label for="encounter-difficulty">Encounter Difficulty</label>
                <select id="encounter-difficulty" name="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                    <option value="deadly">Deadly</option>
                </select>
            </div>

            <div class="form-row">
                <label for="encounter-type">Encounter Type</label>
                <select id="encounter-type" name="encounter_style">
                    <option value="boss">Boss</option>
                    <option value="bossplus">Boss + Minions</option>
                    <option value="duo">Duo of Monsters</option>
                    <option value="trio">Trio of Monsters</option>
                    <option value="horde">Horde</option>
                </select>
            </div>

            <div class="form-row">
                <label for="monster-alignment">Monster Alignment</label>
                <select id="monster-alignment" name="alignment">
                    <option value="any">Any</option>
                    <option value="unaligned">Unaligned</option>
                    <option value="lawgood">Lawful Good</option>
                    <option value="neutgood">Neutral Good</option>
                    <option value="chaosgood">Chaotic Good</option>
                    <option value="lawneut">Lawful Neutral</option>
                    <option value="trueneut">True Neutral</option>
                    <option value="chaosneut">Chaotic Neutral</option>
                    <option value="lawevil">Lawful Evil</option>
                    <option value="neutevil">Neutral Evil</option>
                    <option value="chaosevil">Chaotic Evil</option>
                </select>
            </div>

            <div class="form-row">
                <label for="monster-type">Type of Monster</label>
                <select id="monster-type" name="monster_type">
                    <option value="any">Any</option>
                    <option value="aberration">Aberration</option>
                    <option value="beast">Beast</option>
                    <option value="celestial">Celestial</option>
                    <option value="construct">Construct</option>
                    <option value="dragon">Dragon</option>
                    <option value="elemental">Elemental</option>
                    <option value="fey">Fey</option>
                    <option value="fiend">Fiend</option>
                    <option value="humanoid">Humanoid</option>
                    <option value="monstrosity">Monstrosity</option>
                    <option value="ooze">Ooze</option>
                    <option value="plant">Plant</option>
                    <option value="undead">Undead</option>
                </select>
            </div>

            <div class="form-row">
                <label for="environment">Encounter Environment</label>
                <input type="text" id="environment" name="environment" placeholder="e.g. Forest, Dungeon, Underdark">
            </div>

            <div class="form-row">
                <label for="encounter-context">Additional Context</label>
                <p class="hint">This information helps the AI match the encounter plot to your exact scenario.</p>
                <input type="text" id="encounter-context" name="context" placeholder="e.g. Players are tracking a cult inside an abandoned temple">
            </div>
        </div>

        <input type="submit" value="Generate Encounter">
    </form>
</div>

</body>
</html>
